name: Linux Builds

on:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Linux Build
    runs-on: ubuntu-latest
    env:
      HXCPP_COMPILE_CACHE: ${{ github.workspace }}/.hxcpp
      HXCPP_CACHE_MB: "4096"
    steps:
      - name: Pulling the new commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setting up Haxe
        uses: krdlab/setup-haxe@v2
        with:
          haxe-version: 4.3.7

      - name: Installing native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libglu1-mesa-dev libpulse-dev libasound2-dev libx11-dev libxext-dev libxi-dev libxrandr-dev libxinerama-dev libdbus-1-dev libudev-dev libdrm-dev libgbm-dev libxcursor-dev libxfixes-dev libxss-dev

      - name: Restore library cache
        uses: actions/cache@v4
        with:
          key: haxelib-linux-${{ hashFiles('hmm.json') }}
          path: .haxelib/

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          key: build-linux-release-${{ github.sha }}
          restore-keys: |
            build-linux-release-
          path: |
            .hxcpp/
            !.hxcpp/**/*.pch
            !.hxcpp/**/*.gch
            export/release/linux/haxe/

      - name: Clearing stale precompiled headers
        run: |
          if [ -d .hxcpp ]; then find .hxcpp \( -name '*.pch' -o -name '*.gch' \) -delete; fi

      - name: Installing/Updating libraries
        run: |
          if [ ! -d .haxelib ]; then haxelib newrepo; fi
          haxelib install hmm --quiet
          haxelib run hmm install

      - name: Building hxcpp build tool
        run: |
          cd .haxelib/hxcpp/git/tools/hxcpp
          haxe compile.hxml

      - name: Fetching lime submodules
        run: git -C .haxelib/lime/git submodule update --init --recursive

      - name: Rebuilding lime binaries
        run: |
          haxelib run lime rebuild tools
          haxelib run lime rebuild linux -64

      - name: Building the game
        run: haxelib run lime build linux -DCOMPILE_EXPERIMENTAL

      - name: Packaging the build
        run: tar -czf RevEngine-Linux.tar.gz -C export/release/linux/bin .

      - name: Uploading artifact (entire build)
        uses: actions/upload-artifact@v4
        with:
          name: RevEngine-Linux
          path: RevEngine-Linux.tar.gz

  debug_build:
    name: Linux Debug Build
    runs-on: ubuntu-latest
    env:
      HXCPP_COMPILE_CACHE: ${{ github.workspace }}/.hxcpp
      HXCPP_CACHE_MB: "4096"
    steps:
      - name: Pulling the new commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setting up Haxe
        uses: krdlab/setup-haxe@v2
        with:
          haxe-version: 4.3.7

      - name: Installing native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libglu1-mesa-dev libpulse-dev libasound2-dev libx11-dev libxext-dev libxi-dev libxrandr-dev libxinerama-dev libdbus-1-dev libudev-dev libdrm-dev libgbm-dev libxcursor-dev libxfixes-dev libxss-dev

      - name: Restore library cache
        uses: actions/cache@v4
        with:
          key: haxelib-linux-${{ hashFiles('hmm.json') }}
          path: .haxelib/

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          key: build-linux-debug-${{ github.sha }}
          restore-keys: |
            build-linux-debug-
          path: |
            .hxcpp/
            !.hxcpp/**/*.pch
            !.hxcpp/**/*.gch
            export/debug/linux/haxe/

      - name: Clearing stale precompiled headers
        run: |
          if [ -d .hxcpp ]; then find .hxcpp \( -name '*.pch' -o -name '*.gch' \) -delete; fi

      - name: Installing/Updating libraries
        run: |
          if [ ! -d .haxelib ]; then haxelib newrepo; fi
          haxelib install hmm --quiet
          haxelib run hmm install

      - name: Building hxcpp build tool
        run: |
          cd .haxelib/hxcpp/git/tools/hxcpp
          haxe compile.hxml

      - name: Fetching lime submodules
        run: git -C .haxelib/lime/git submodule update --init --recursive

      - name: Rebuilding lime binaries
        run: |
          haxelib run lime rebuild tools
          haxelib run lime rebuild linux -64
          haxelib run lime rebuild linux -64 -debug

      - name: Building the game
        run: haxelib run lime build linux -debug

      - name: Packaging the build
        run: tar -czf RevEngine-Linux-Debug.tar.gz -C export/debug/linux/bin .

      - name: Uploading artifact (entire build)
        uses: actions/upload-artifact@v4
        with:
          name: RevEngine-Linux-Debug
          path: RevEngine-Linux-Debug.tar.gz
