name: Windows Builds

on:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Windows Build
    runs-on: windows-latest
    env:
      HXCPP_COMPILE_CACHE: ${{ github.workspace }}\.hxcpp
      HXCPP_CACHE_MB: "4096"
    steps:
      - name: Pulling the new commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setting up Haxe
        uses: krdlab/setup-haxe@v2
        with:
          haxe-version: 4.3.7

      - name: Restore library cache
        uses: actions/cache@v4
        with:
          key: haxelib-windows-${{ hashFiles('hmm.json') }}
          path: .haxelib/

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          key: build-windows-release-${{ github.sha }}
          restore-keys: |
            build-windows-release-
          path: |
            .hxcpp/
            !.hxcpp/**/*.pch
            !.hxcpp/**/*.gch
            export/release/windows/haxe/

      - name: Clear read-only attributes on cached libraries
        continue-on-error: true
        shell: pwsh
        run: |
          if (Test-Path .haxelib) {
            attrib -r ".haxelib\*" /s /d
          }

      - name: Clearing stale precompiled headers
        shell: bash
        run: |
          if [ -d .hxcpp ]; then find .hxcpp \( -name '*.pch' -o -name '*.gch' \) -delete; fi

      - name: Installing/Updating libraries
        shell: bash
        run: |
          if [ ! -d .haxelib ]; then haxelib newrepo; fi
          haxelib install hmm --quiet
          haxelib run hmm install

      - name: Building hxcpp build tool
        shell: bash
        run: |
          cd .haxelib/hxcpp/git/tools/hxcpp
          haxe compile.hxml

      - name: Fetching lime submodules
        shell: bash
        run: git -C .haxelib/lime/git submodule update --init --recursive

      - name: Rebuilding lime binaries
        run: |
          haxelib run lime rebuild tools
          haxelib run lime rebuild windows -64

      - name: Building the game
        run: haxelib run lime build windows -DCOMPILE_EXPERIMENTAL

      - name: Uploading artifact (entire build)
        uses: actions/upload-artifact@v4
        with:
          name: RevEngine-Windows
          path: export/release/windows/bin

  debug_build:
    name: Windows Debug Build
    runs-on: windows-latest
    env:
      HXCPP_COMPILE_CACHE: ${{ github.workspace }}\.hxcpp
      HXCPP_CACHE_MB: "4096"
    steps:
      - name: Pulling the new commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setting up Haxe
        uses: krdlab/setup-haxe@v2
        with:
          haxe-version: 4.3.7

      - name: Restore library cache
        uses: actions/cache@v4
        with:
          key: haxelib-windows-${{ hashFiles('hmm.json') }}
          path: .haxelib/

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          key: build-windows-debug-${{ github.sha }}
          restore-keys: |
            build-windows-debug-
          path: |
            .hxcpp/
            !.hxcpp/**/*.pch
            !.hxcpp/**/*.gch
            export/debug/windows/haxe/

      - name: Clear read-only attributes on cached libraries
        continue-on-error: true
        shell: pwsh
        run: |
          if (Test-Path .haxelib) {
            attrib -r ".haxelib\*" /s /d
          }

      - name: Clearing stale precompiled headers
        shell: bash
        run: |
          if [ -d .hxcpp ]; then find .hxcpp \( -name '*.pch' -o -name '*.gch' \) -delete; fi

      - name: Installing/Updating libraries
        shell: bash
        run: |
          if [ ! -d .haxelib ]; then haxelib newrepo; fi
          haxelib install hmm --quiet
          haxelib run hmm install

      - name: Building hxcpp build tool
        shell: bash
        run: |
          cd .haxelib/hxcpp/git/tools/hxcpp
          haxe compile.hxml

      - name: Fetching lime submodules
        shell: bash
        run: git -C .haxelib/lime/git submodule update --init --recursive

      - name: Rebuilding lime binaries
        run: |
          haxelib run lime rebuild tools
          haxelib run lime rebuild windows -64
          haxelib run lime rebuild windows -64 -debug

      - name: Building the game
        run: haxelib run lime build windows -debug

      - name: Uploading artifact (entire build)
        uses: actions/upload-artifact@v4
        with:
          name: RevEngine-Windows-Debug
          path: export/debug/windows/bin
